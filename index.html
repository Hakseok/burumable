<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>부르마블 자산 관리</title>
  <!-- 외부 CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- 아이콘 라이브러리 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- 폰트 -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
</head>
<body>
  <!-- 헤더 -->
  <header>
    <img src="logo.png" alt="Burumable Logo">
    <span>부르마블 자산 관리</span>
  </header>

  <!-- 메인 컨테이너 -->
  <div class="container">
    <!-- 좌측 영역 -->
    <div class="left">
      <!-- 상단 컨트롤 -->
      <div class="top-controls">
        <button class="action reset" id="resetBtn"><i class="fa fa-undo"></i> 초기화</button>
        <button class="action add" id="addBtn"><i class="fa fa-user-plus"></i> 플레이어 추가</button>
      </div>

      <!-- 플레이어 카드 영역 -->
      <div class="players" id="players"></div>

      <!-- 턴 표시 -->
      <div class="turn-area">
        <div id="currentPlayer" style="font-weight:bold;">현재 차례: 없음</div>
        <button class="action turn" onclick="nextTurn()"><i class="fa fa-forward"></i> 다음 턴</button>
      </div>

      <!-- 입력 금액 표시 -->
      <div id="display">현재 입력 금액: ₩0 (-)</div>

      <!-- 입력 영역 -->
      <div class="input-area">
        <!-- 숫자패드 -->
        <div class="keypad" id="keypad"></div>
        <!-- 액션 버튼 그룹 -->
        <div class="actions">
          <button class="action salary" onclick="applyAction('salary')">
            <i class="fa fa-money-bill"></i> 월급 지급
          </button>
          <button class="action buy" onclick="applyAction('buy')">
            <i class="fa fa-building"></i> 나라 구매
          </button>
          <button class="action build" onclick="applyAction('build')">
            <i class="fa fa-home"></i> 건물 구매
          </button>
          <button class="action gold" onclick="applyAction('gold')">
            <i class="fa fa-star"></i> 황금카드 이벤트
          </button>
          <div class="toll-area">
            <select id="tollTarget"></select>
            <button class="action toll" onclick="applyAction('toll')">
              <i class="fa fa-road"></i> 통행료 지급
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 우측 영역 (게임 로그) -->
    <div class="right">
      <h3><i class="fa fa-list"></i> 게임 이력</h3>
      <div id="log"></div>
    </div>
  </div>

  <!-- 외부 JS -->
  <script src="script.js"></script>
</body>
</html>
